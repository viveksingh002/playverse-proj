<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact</title>
  <link rel="stylesheet" href="contact.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
</head>
<body>

  <section class="contact-section">

    <div class="contact-wrap">

      <div class="contact-header">
        <div class="contact-icon">
          <i class="ti ti-mail"></i>
        </div>
        <div>
          <h2>Contact Me</h2>
          <p>I'll get back to you within 24 hours</p>
        </div>
      </div>

      <form action="https://formspree.io/f/mgobjjwa" method="POST" class="contact-form">

        <div class="field-row">
          <div class="field">
            <label for="name">Your name</label>
            <input type="text" id="name" name="name" placeholder="Alex Smith" required>
          </div>
          <div class="field">
            <label for="email">Email address</label>
            <input type="email" id="email" name="email" placeholder="alex@email.com" required>
          </div>
        </div>

        <div class="field">
          <label for="message">Message</label>
          <textarea id="message" name="message" placeholder="What's on your mind?" required></textarea>
        </div>

        <button type="submit" class="submit-btn">
          <i class="ti ti-send"></i>
          Send Message
        </button>

      </form>

      <div class="divider"></div>

      <div class="contact-links">
        <a href="#" class="contact-link"><i class="ti ti-brand-twitter"></i> Twitter</a>
        <a href="#" class="contact-link"><i class="ti ti-brand-linkedin"></i> LinkedIn</a>
        <a href="#" class="contact-link"><i class="ti ti-brand-github"></i> GitHub</a>
      </div>

    </div>

  </section>

</body>
</html>
